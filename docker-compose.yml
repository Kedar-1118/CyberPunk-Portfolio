version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      # Add other environment variables here or use an env_file
      # - MONGODB_URI=...
      # - EMAIL_USER=...
      # - EMAIL_PASS=...
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: always
